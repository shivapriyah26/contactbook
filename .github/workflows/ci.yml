name: CI - Lint, Test, Build

on:
  push:
    branches: [feature/**, hotfix/**, develop, main]
  pull_request:
    branches: [develop, main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install lint tools
        run: pip install flake8 black
      - name: Run flake8
        run: flake8 backend/app --max-line-length=100
      - name: Check formatting with black
        run: black --check backend/app

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest httpx
      - name: Run tests
        working-directory: backend
        run: pytest tests/ -v --junitxml=test-results.xml
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: backend/test-results.xml

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main')
    permissions:
      id-token: write
      contents: read
    outputs:
      image_tag: ${{ steps.vars.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Debug role ARN
        run: |
          echo "ARN length is: ${#AWS_ROLE_ARN}"
          echo "Expected length is: 56"
          echo "$AWS_ROLE_ARN" | od -c | head -5
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image
        run: |
          docker build \
            -t ${{ steps.ecr-login.outputs.registry }}/contactbook:${{ steps.vars.outputs.tag }} \
            -t ${{ steps.ecr-login.outputs.registry }}/contactbook:latest \
            ./backend

      - name: Push image to ECR
        run: |
          docker push ${{ steps.ecr-login.outputs.registry }}/contactbook:${{ steps.vars.outputs.tag }}
          docker push ${{ steps.ecr-login.outputs.registry }}/contactbook:latest
