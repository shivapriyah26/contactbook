name: CI - Lint, Test, Build, Deploy Dev

on:
  push:
    branches: [feature/**, hotfix/**, develop, main]
  pull_request:
    branches: [develop, main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install lint tools
        run: pip install flake8 black
      - name: Run flake8
        run: flake8 backend/app --max-line-length=100
      - name: Check formatting with black
        run: black --check backend/app

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest httpx
      - name: Run tests
        working-directory: backend
        run: pytest tests/ -v --junitxml=test-results.xml
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: backend/test-results.xml

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main')
    permissions:
      id-token: write
      contents: read
    outputs:
      image_tag: ${{ steps.vars.outputs.tag }}
      registry: ${{ steps.ecr-login.outputs.registry }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image
        run: |
          docker build \
            -t ${{ steps.ecr-login.outputs.registry }}/contactbook:${{ steps.vars.outputs.tag }} \
            -t ${{ steps.ecr-login.outputs.registry }}/contactbook:latest \
            ./backend

      - name: Push image to ECR
        run: |
          docker push ${{ steps.ecr-login.outputs.registry }}/contactbook:${{ steps.vars.outputs.tag }}
          docker push ${{ steps.ecr-login.outputs.registry }}/contactbook:latest

  deploy-dev:
    name: Deploy to Development (ECS)
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: development
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Register new task definition revision with the new image
        id: register-task-def
        run: |
          IMAGE="${{ steps.ecr-login.outputs.registry }}/contactbook:${{ needs.build-and-push.outputs.image_tag }}"
          echo "Deploying image: $IMAGE"

          aws ecs describe-task-definition \
            --task-definition contactbook-service-dev \
            --query "taskDefinition" > current-task-def.json

          jq --arg IMAGE "$IMAGE" \
            '.containerDefinitions[0].image = $IMAGE |
             del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                 .compatibilities, .registeredAt, .registeredBy)' \
            current-task-def.json > new-task-def.json

          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://new-task-def.json \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)

          echo "new_task_def_arn=$NEW_ARN" >> $GITHUB_OUTPUT
          echo "Registered: $NEW_ARN"

      - name: Update ECS service to use the new task definition
        run: |
          aws ecs update-service \
            --cluster contact-book-dev \
            --service contactbook-service-dev \
            --task-definition "${{ steps.register-task-def.outputs.new_task_def_arn }}" \
            --force-new-deployment

          echo "Waiting for service to stabilize..."
          aws ecs wait services-stable \
            --cluster contact-book-dev \
            --services contactbook-service-dev

      - name: Get task public IP for health check
        id: get-ip
        run: |
          TASK_ARN=$(aws ecs list-tasks --cluster contact-book-dev \
            --service-name contactbook-service-dev \
            --query 'taskArns[0]' --output text)

          ENI_ID=$(aws ecs describe-tasks --cluster contact-book-dev \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].attachments[0].details[?name==`networkInterfaceId`].value' \
            --output text)

          PUBLIC_IP=$(aws ec2 describe-network-interfaces \
            --network-interface-ids "$ENI_ID" \
            --query 'NetworkInterfaces[0].Association.PublicIp' \
            --output text)

          echo "public_ip=$PUBLIC_IP" >> $GITHUB_OUTPUT
          echo "Task public IP: $PUBLIC_IP"

      - name: Health check
        run: |
          URL="http://${{ steps.get-ip.outputs.public_ip }}:9999/health"
          echo "Checking $URL"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$URL" || echo "000")
            if [ "$STATUS" == "200" ]; then
              echo "Healthy (HTTP $STATUS) on attempt $i"
              exit 0
            fi
            echo "Attempt $i: not healthy yet (HTTP $STATUS), retrying in 15s..."
            sleep 15
          done
          echo "Health check failed after 5 attempts."
          exit 1

  deploy-prod:
    name: Deploy to Production (requires approval)
    runs-on: ubuntu-latest
    needs: [deploy-dev, build-and-push]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Snapshot current production task definition (for rollback)
        id: snapshot
        run: |
          CURRENT_ARN=$(aws ecs describe-services \
            --cluster contact-book-prod \
            --services contactbook-service-prod \
            --query "services[0].taskDefinition" --output text)
          echo "previous_task_def_arn=$CURRENT_ARN" >> $GITHUB_OUTPUT
          echo "Current production task definition: $CURRENT_ARN"

      - name: Register new task definition revision with the new image
        id: register-task-def
        run: |
          IMAGE="${{ steps.ecr-login.outputs.registry }}/contactbook:${{ needs.build-and-push.outputs.image_tag }}"
          echo "Deploying image: $IMAGE"

          aws ecs describe-task-definition \
            --task-definition contactbook-service-prod \
            --query "taskDefinition" > current-task-def.json

          jq --arg IMAGE "$IMAGE" \
            '.containerDefinitions[0].image = $IMAGE |
             del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                 .compatibilities, .registeredAt, .registeredBy)' \
            current-task-def.json > new-task-def.json

          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://new-task-def.json \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)

          echo "new_task_def_arn=$NEW_ARN" >> $GITHUB_OUTPUT
          echo "Registered: $NEW_ARN"

      - name: Deploy new task definition to production
        run: |
          aws ecs update-service \
            --cluster contact-book-prod \
            --service contactbook-service-prod \
            --task-definition "${{ steps.register-task-def.outputs.new_task_def_arn }}" \
            --force-new-deployment

          echo "Waiting for service to stabilize..."
          aws ecs wait services-stable \
            --cluster contact-book-prod \
            --services contactbook-service-prod

      - name: Get task public IP
        id: get-ip
        run: |
          TASK_ARN=$(aws ecs list-tasks --cluster contact-book-prod \
            --service-name contactbook-service-prod \
            --query 'taskArns[0]' --output text)

          ENI_ID=$(aws ecs describe-tasks --cluster contact-book-prod \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].attachments[0].details[?name==`networkInterfaceId`].value' \
            --output text)

          PUBLIC_IP=$(aws ec2 describe-network-interfaces \
            --network-interface-ids "$ENI_ID" \
            --query 'NetworkInterfaces[0].Association.PublicIp' \
            --output text)

          echo "public_ip=$PUBLIC_IP" >> $GITHUB_OUTPUT
          echo "Task public IP: $PUBLIC_IP"

      - name: Health check
        id: healthcheck
        run: |
          URL="http://${{ steps.get-ip.outputs.public_ip }}:9999/health"
          echo "Checking $URL"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$URL" || echo "000")
            if [ "$STATUS" == "200" ]; then
              echo "Healthy (HTTP $STATUS) on attempt $i"
              exit 0
            fi
            echo "Attempt $i: not healthy yet (HTTP $STATUS), retrying in 15s..."
            sleep 15
          done
          echo "Health check FAILED after 5 attempts."
          exit 1

      - name: Automatic rollback on failed health check
        if: failure() && steps.healthcheck.outcome == 'failure'
        run: |
          echo "Rolling back to ${{ steps.snapshot.outputs.previous_task_def_arn }}"
          aws ecs update-service \
            --cluster contact-book-prod \
            --service contactbook-service-prod \
            --task-definition "${{ steps.snapshot.outputs.previous_task_def_arn }}" \
            --force-new-deployment

          aws ecs wait services-stable \
            --cluster contact-book-prod \
            --services contactbook-service-prod

          echo "Rollback complete."

      - name: Send failure email notification
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Production deployment FAILED - rolled back - ${{ github.repository }}"
          to: ${{ secrets.NOTIFY_EMAIL_TO }}
          from: CI/CD Pipeline
          body: |
            Production deployment failed its health check and was automatically
            rolled back to the previous stable version.

            Repository: ${{ github.repository }}
            Commit: ${{ github.sha }}
            Triggered by: ${{ github.actor }}
            Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Please investigate before re-attempting deployment.

      - name: Deployment succeeded
        if: success()
        run: echo "Production deployment succeeded and passed health checks."
