server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Used by Docker HEALTHCHECK, ECS target group, and the pipeline's
    # health-check.sh script
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        try_files $uri /index.html;
    }

    gzip on;
    gzip_types text/css application/javascript application/json;
}
